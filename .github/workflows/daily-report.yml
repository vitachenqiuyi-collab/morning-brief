name: Daily Morning Brief

on:
  schedule:
    - cron: "0 1 * * *"
    - cron: "30 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  daily:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate morning brief
        run: |
          cp data/today.json data/previous.json
          npm run generate
          npm run prepare-feishu
      - name: Save updated report
        run: |
          git config user.name "Morning Brief Bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/today.json
          if ! git diff --staged --quiet; then
            git commit -m "chore: refresh daily brief"
            git pull --rebase origin main
            git push
          fi
      - name: Send to Feishu
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then exit 0; fi
          curl -fsS -X POST "$FEISHU_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            --data @data/feishu-payload.json
