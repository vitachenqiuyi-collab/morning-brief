name: Daily Morning Brief

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write
env:
  FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
jobs:
  generate-and-send:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate morning brief
        run: npm run generate

      - name: Save updated report
        run: |
          git config user.name "Morning Brief Bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/today.json
          git diff --staged --quiet || git commit -m "chore: refresh daily brief"
          git push

      - name: Send to Feishu
      if: env.FEISHU_WEBHOOK_URL != ''
        run: |
          node --input-type=module <<'EOF'
          import fs from "node:fs";

          const report = JSON.parse(fs.readFileSync("data/today.json", "utf8"));
          const labels = {
            flight: "航班",
            visa: "签证",
            international: "国际",
            other: "其他"
          };

          const lines = [
            `【${report.title}】${report.date}`,
            `头条：${report.headline.title}`,
            report.headline.summary || "",
            report.headline.url || ""
          ];

          for (const [key, label] of Object.entries(labels)) {
            const stories = report.categories?.[key] || [];
            if (!stories.length) continue;
            lines.push(`\n【${label}】`);
            for (const story of stories) {
              lines.push(`• ${story.title}`);
              if (story.summary) lines.push(story.summary);
              if (story.url) lines.push(story.url);
            }
          }

          const response = await fetch(process.env.FEISHU_WEBHOOK_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              msg_type: "text",
              content: { text: lines.filter(Boolean).join("\n") }
            })
          });

          if (!response.ok) throw new Error(`Feishu webhook failed: ${response.status}`);
          EOF
