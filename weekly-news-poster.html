    ol { list-style:none; padding:0; margin:0; counter-reset:news; display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:12px; }.item { counter-increment:news; min-height:157px; padding:17px 15px 15px; border:1px solid #e1f3ff55; border-radius:13px; background:linear-gradient(140deg,#eff8ff38,#b7dcff1a); box-shadow:inset 0 1px #ffffff48,0 8px 18px #073f8326; backdrop-filter:blur(13px); position:relative; overflow:hidden; }.item::before { content:counter(news, decimal-leading-zero); color:#ffe6a4; font:800 12px/1 Arial,sans-serif; letter-spacing:.11em; display:block; margin-bottom:11px; }.item:first-child { grid-column:1 / -1; min-height:205px; padding:26px 25px; border:2px solid #ffcf668f; background:linear-gradient(120deg,#0857b8c4,#2c9ae2b8); box-shadow:inset 0 1px #ffffff70,0 12px 26px #073d8580; }.item:first-child::after { content:"今日头条"; position:absolute; top:18px; right:20px; color:#8b4000; background:linear-gradient(90deg,#ffd866,#ff9d18); border-radius:15px; padding:7px 12px; font:800 12px Arial,sans-serif; box-shadow:0 4px 10px #71410044; }.item p { margin:0; font-size:16px; font-weight:700; line-height:1.55; letter-spacing:.01em; text-shadow:0 1px 4px #08427a77; }.item:first-child p { font-size:26px; line-height:1.45; max-width:500px; }.item .over { color:#fff0a6; font-size:12px; margin-top:5px; }

    ol { gap:13px; }.item { min-height:150px; padding:18px 17px; border:0; border-radius:20px; background:#fff; box-shadow:0 8px 22px #526f8e18; backdrop-filter:none; }.item::before { color:#5d89b5; font-size:11px; margin-bottom:12px; }.item p { color:#24262b; font-size:16px; line-height:1.5; text-shadow:none; letter-spacing:-.015em; }.item:first-child { min-height:305px; padding:30px 34px 28px; border:0; border-radius:25px; background:#0071e3; box-shadow:0 14px 30px #2563a34d; display:flex; flex-direction:column; justify-content:center; align-items:flex-start; }.item:first-child::before { color:#d7efff; font-size:12px; margin-bottom:24px; }.item:first-child::after { top:25px; right:28px; color:#5d4300; background:#ffcc00; border-radius:99px; padding:7px 12px; font-size:11px; box-shadow:none; }.item:first-child p { max-width:100%; padding-right:0; color:#fff; font-size:36px; line-height:1.28; letter-spacing:-.055em; text-shadow:none; overflow-wrap:anywhere; }

    .poster .footer { align-items:end; margin-top:22px; }.cover-footer-title,.card-footer-title { display:flex; flex-direction:column; gap:3px; color:#1d1d1f; font:700 15px/1.2 "PingFang SC",sans-serif; letter-spacing:-.025em; }.cover-footer-title em,.card-footer-title em { color:#1771cb; font-style:normal; }.cover-footer-title small,.card-footer-title small { color:#6d747d; font:600 11px/1.35 "PingFang SC",sans-serif; letter-spacing:.01em; }
    .card-pages { display:grid; gap:32px; margin-top:36px; }.single-card { width:720px; min-height:1018px; padding:48px 46px 36px; background:#fff; color:#1d1d1f; box-shadow:0 16px 42px #58748e33; display:flex; flex-direction:column; }.single-card-head { display:flex; justify-content:space-between; align-items:start; }.single-card-head div:first-child { display:flex; flex-direction:column; }.single-month { color:#6e737a; font:700 16px/1 Arial,sans-serif; letter-spacing:.08em; }.single-card-head strong { font:700 164px/.78 "SF Pro Display","Times New Roman",serif; letter-spacing:-.1em; margin-left:-10px; }.single-date { text-align:right; font:700 22px/1.45 "PingFang SC",sans-serif; }.single-date span { color:#6e737a; font-size:14px; font-weight:500; }.single-card h2 { margin:20px 0 26px auto; max-width:550px; font:700 46px/1.12 "SF Pro Display","PingFang SC",sans-serif; letter-spacing:-.06em; text-align:right; }.card-media { width:100%; aspect-ratio:3 / 2; height:auto; overflow:hidden; background:#f5f5f7; }.card-media img { width:100%; height:100%; object-fit:cover; display:block; }.image-placeholder { width:100%; height:100%; display:grid; place-items:center; color:#fff; font:600 15px "PingFang SC",sans-serif; }.image-placeholder.blue { background:#0071e3; }.image-placeholder.yellow { background:#ffcc00; color:#5b4700; }.image-placeholder.red { background:#ff3b30; }.card-caption { margin:24px 0 0; max-width:560px; font:600 21px/1.48 "Songti SC","STSong",serif; letter-spacing:-.025em; }.card-detail { margin:15px 0 0; max-width:560px; color:#61676d; font:400 14px/1.65 "PingFang SC",sans-serif; }.single-card footer { margin-top:auto; padding-top:22px; display:flex; justify-content:space-between; align-items:end; border-top:1px solid #d2d2d7; color:#6e737a; font:12px/1.4 Arial,sans-serif; letter-spacing:.04em; }.single-card.blue strong { color:#0071e3; }.single-card.yellow strong { color:#e7a500; }.single-card.red strong { color:#ff3b30; }.flight-upload { color:#6e737a; <body>

② 车行专属折扣8折起，热门目的地包括但不限于美新澳/东南亚/欧洲...

④ 发小红书笔记赢现金蕞高⑥O⑥O元红|包奖励</textarea>

      <div class="intro"><span id="view-subtitle">签证政策 · 航线动态 · 出行提醒</span></div>
        <ol id="news-list"></ol>
        <footer class="footer"><span class="cover-footer-title"><b>租租车</b><em>[一周资讯]</em><small>出行政策 · 航线动态 · 旅行优惠</small></span><span><span class="count" id="news-count">0</span> ITEMS · 每条 ≤ 50 字</span></footer>
      </article>
      <section class="card-pages" id="card-pages" aria-label="单条资讯卡片"></section>

  <div class="highlight-popover" id="highlight-popover" role="toolbar" aria-label="文字高亮选项" hidden>
    <button type="button" data-highlight-color="yellow" title="黄色高亮"><i></i>高亮</button>
    <button type="button" data-highlight-color="blue" title="蓝色高亮"><i></i></button>

  </div>
  <script src="assets/html2canvas.min.js"></script>
  <script>
    const $ = id => document.getElementById(id);
    const images = [];
    const highlights = [];
    const discountImages = { leftOne: '', leftTwo: '', right: '' };
    let selectedHighlightText = '';
    const flightTitle = '近期国际航班变化汇总';
    const flightDisclaimer = '航班时刻均为当地时间；具体执行以航空公司实际公布为准。';
    const cardTitles = ['泰国取消60天免签','香港航司下调燃油费','玻利维亚电子签获认可',flightTitle];
    const cardBodies = [
      '5月19日，泰国内阁批准取消60天免签入境政策，拟恢复此前约30天免签标准。具体生效日期尚未披露，请以泰方正式公告为准。',
      '香港航空自5月18日起下调燃油附加费：日本、韩国航线降50港币至339港币；欧洲、中东等长途航线降198港币至1362港币。香港快运自5月16日起，除往返内地航段外，其他香港出发航段由389港币降至339港币。',
      '根据IATA最新更新，玻利维亚电子签证（E-VISA）已获正式认可。旅客从第三国飞往玻利维亚时，航空公司将接受该签证；出行前仍应核对签证申请要求及航司规定。',
      flightDisclaimer
    ];
    const flightDetails = [
      ['喜马拉雅航空', '深圳 → 德满都', '6月5日开航 · 周一、五、日；6月下旬加周四'],
      ['印度航空', '德里 → 上海浦东', '预计停飞至8月 · 6—8月航班陆续取消']
    ];
    const esc = value => value.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]));
    const escapeRegExp = value => value.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    function highlighted(value = '') {
      const active = highlights.filter(item => item.text);
      if (!active.length) return esc(String(value));
      const colors = new Map(active.map(item => [item.text, item.color]));
      const pattern = active.map(item => escapeRegExp(item.text)).sort((a, b) => b.length - a.length).join('|');
      const matcher = new RegExp(pattern, 'g');
      let output = '', cursor = 0;
      String(value).replace(matcher, (match, offset) => {
        output += esc(String(value).slice(cursor, offset));
        output += `<mark class="text-highlight ${colors.get(match)}">${esc(match)}</mark>`;
        cursor = offset + match.length;
        return match;
      });
      return output + esc(String(value).slice(cursor));
    }
    function hideHighlightPopover() { $('highlight-popover').hidden = true; }
    function showHighlightPopover(input, event) {
      const popover = $('highlight-popover');
      const rect = input.getBoundingClientRect();
      const x = event?.clientX || rect.right - 150;
      const y = event?.clientY || rect.top;
      popover.style.left = `${Math.min(window.innerWidth - 205, Math.max(8, x + 8))}px`;
      popover.style.top = `${Math.min(window.innerHeight - 46, Math.max(8, y - 42))}px`;
      popover.hidden = false;
    }
    function captureTextSelection(input, event) {
      const start = input.selectionStart;
      const end = input.selectionEnd;
      const selected = typeof start === 'number' && typeof end === 'number' ? input.value.slice(start, end).trim() : '';
      if (selected) { selectedHighlightText = selected; showHighlightPopover(input, event); }
    }
    function bindTextSelection(input) {
      ['select','mouseup','keyup'].forEach(eventName => input.addEventListener(eventName, event => captureTextSelection(input, event)));
    }
    function normalizeRows() {
      const rawRows = $('news-input').value.split(/\r?\n/).map(x => x.trim()).filter(Boolean);
      const rows = rawRows.filter(row => row !== flightTitle);
      rows.push(flightTitle);
      while (cardTitles.length < rows.length) cardTitles.splice(cardTitles.length - 1, 0, '新资讯标题');
      while (cardBodies.length < rows.length) cardBodies.splice(cardBodies.length - 1, 0, '请填写资讯卡正文。');
      while (images.length < rows.length) images.splice(images.length - 1, 0, '');
      cardTitles.length = rows.length; cardBodies.length = rows.length; images.length = rows.length;
      cardTitles[rows.length - 1] = flightTitle;
      return rows;
    }
    function addCard() {
      const rows = normalizeRows();
      rows.splice(rows.length - 1, 0, '新资讯：请填写主题、动作与关键差异');
      cardTitles.splice(rows.length - 1, 0, '新资讯标题');
      cardBodies.splice(rows.length - 1, 0, '请填写资讯卡正文。');
      images.splice(rows.length - 1, 0, '');
      $('news-input').value = rows.join('\n'); refresh();
    }
    function deleteCard(index) {
      const rows = normalizeRows();
      if (index >= rows.length - 1 || rows.length <= 2) return;
      if (images[index]) URL.revokeObjectURL(images[index]);
      rows.splice(index, 1); cardTitles.splice(index, 1); cardBodies.splice(index, 1); images.splice(index, 1);
      $('news-input').value = rows.join('\n'); refresh();
    }
    function renderImageControls(rows) {
      const flightIndex = rows.length - 1;
      $('image-controls').innerHTML = `<label>单条资讯配图（可选）</label><p class="upload-hint">上传后会显示在对应的单条资讯卡中；航班汇总卡固定为航线清单，不需要配图。</p>${rows.map((_, index) => index === flightIndex ? `<div class="upload-row flight-upload">${String(index + 1).padStart(2, '0')} · 航线汇总卡（固定最后一位，无需配图）</div>` : `<label class="upload-row">${String(index + 1).padStart(2, '0')} <input type="file" accept="image/*" data-image-index="${index}" /></label>`).join('')}`;
      $('image-controls').querySelectorAll('input[type="file"]').forEach(input => input.addEventListener('change', event => {
        const index = Number(event.target.dataset.imageIndex);
        if (images[index]) URL.revokeObjectURL(images[index]);
        images[index] = event.target.files[0] ? URL.createObjectURL(event.target.files[0]) : '';
        renderCards(rows);
      }));
    }
    function renderStoryEditors(rows) {
      const flightIndex = rows.length - 1;
      $('story-editors').innerHTML = `<label>资讯卡标题（每条 ≤ 15 字）</label><button type="button" class="add-card" id="add-card">＋ 添加资讯卡</button>${rows.map((_, index) => `<label class="story-title-row">${String(index + 1).padStart(2, '0')} <input type="text" maxlength="15" value="${esc(cardTitles[index] || '')}" data-title-index="${index}" ${index === flightIndex ? 'readonly' : ''}/><span>${(cardTitles[index] || '').length}/15</span>${index === flightIndex ? '<i>固定最后</i>' : `<button type="button" class="delete-card" data-delete-index="${index}">删除</button>`}</label>`).join('')}`;
      $('add-card').addEventListener('click', addCard);
      $('story-editors').querySelectorAll('button[data-delete-index]').forEach(button => button.addEventListener('click', () => deleteCard(Number(button.dataset.deleteIndex))));
      $('story-editors').querySelectorAll('input[data-title-index]').forEach(input => {
        bindTextSelection(input);
        input.addEventListener('input', event => {
          const index = Number(event.target.dataset.titleIndex);
          cardTitles[index] = event.target.value;
          event.target.parentElement.querySelector('span').textContent = `${event.target.value.length}/15`;
          renderCards($('news-input').value.split(/\r?\n/).map(x => x.trim()).filter(Boolean));
        });
      });
    }
    function renderBodyEditors(rows) {
      const flightIndex = rows.length - 1;
      $('body-editors').innerHTML = `<label>资讯卡正文（每条 ≤ 250 字）</label><p class="upload-hint">只显示在对应的单条资讯卡中，不影响总封面。</p>${rows.map((_, index) => index === flightIndex ? `<div class="body-editor-row"><span>${String(index + 1).padStart(2, '0')}</span><div class="fixed-note">固定提示：${esc(flightDisclaimer)}</div></div>` : `<label class="body-editor-row">${String(index + 1).padStart(2, '0')} <textarea maxlength="250" data-body-index="${index}">${esc(cardBodies[index] || '')}</textarea><span>${(cardBodies[index] || '').length}/250</span></label>`).join('')}`;
      $('body-editors').querySelectorAll('textarea[data-body-index]').forEach(input => {
        bindTextSelection(input);
        input.addEventListener('input', event => {
          const index = Number(event.target.dataset.bodyIndex);
          cardBodies[index] = event.target.value;
          event.target.parentElement.querySelector('span').textContent = `${event.target.value.length}/250`;
          renderCards($('news-input').value.split(/\r?\n/).map(x => x.trim()).filter(Boolean));
        });
      });
    }
    function renderFlightEditors(rows) {
      const flightLimitReached = flightDetails.length >= 5;
      $('flight-editors').innerHTML = `<label>航班清单（固定为最后一张资讯卡）</label><p class="upload-hint">可新增、删除或修改每条航班信息；最多 5 条，下方提示语固定不可修改。</p><button type="button" class="add-card" id="add-flight" ${flightLimitReached ? 'disabled' : ''}>${flightLimitReached ? '最多 5 条' : '＋ 添加航班'}</button>${flightDetails.map((flight, index) => `<div class="flight-editor-row"><span>${String(index + 1).padStart(2, '0')}</span><div class="flight-fields"><input value="${esc(flight[0])}" data-flight-index="${index}" data-flight-field="0" placeholder="航空公司" /><input value="${esc(flight[1])}" data-flight-index="${index}" data-flight-field="1" placeholder="起点 → 目的地" /><input value="${esc(flight[2])}" data-flight-index="${index}" data-flight-field="2" placeholder="生效日期 · 班次" /></div><button type="button" data-delete-flight="${index}">删除</button></div>`).join('')}`;
      $('add-flight').addEventListener('click', () => { if (flightDetails.length >= 5) return; flightDetails.push(['新航空公司', '起点 → 目的地', '生效日期 · 班次']); renderFlightEditors(rows); renderCards(rows); });
      $('flight-editors').querySelectorAll('input[data-flight-index]').forEach(input => {
        bindTextSelection(input);
        input.addEventListener('input', event => { flightDetails[Number(event.target.dataset.flightIndex)][Number(event.target.dataset.flightField)] = event.target.value; renderCards(rows); });
      });
      $('flight-editors').querySelectorAll('button[data-delete-flight]').forEach(button => button.addEventListener('click', () => { flightDetails.splice(Number(button.dataset.deleteFlight), 1); renderFlightEditors(rows); renderCards(rows); }));
    }
    function renderCards(rows) {
      const date = $('poster-date').value.trim() || '本期';
      $('card-pages').innerHTML = rows.map((item, index) => {
        const color = ['blue','yellow','red'][index % 3];
        const isFlight = index === rows.length - 1;
        const media = isFlight ? `<div class="flight-details">${flightDetails.map(([airline, route, schedule]) => `<div class="flight-row"><b>${highlighted(airline)}</b><span>${highlighted(route)}</span><em>${highlighted(schedule)}</em></div>`).join('')}</div>` : images[index] ? `<img src="${images[index]}" alt="第 ${index + 1} 条资讯配图" />` : `<div class="image-placeholder ${color}"><span>上传配图</span></div>`;
        const detail = isFlight ? flightDisclaimer : cardBodies[index];
        return `<article class="single-card ${color}${isFlight ? ' flight-card' : ''}"><header class="single-card-head"><div><span class="single-month">WEEKLY</span><strong>${String(index + 1).padStart(2, '0')}</strong></div><div class="single-date card-logo"><img src="assets/zuzuche-logo-reference.png" alt="租租车" /></div></header><h2>${highlighted(cardTitles[index] || item)}</h2><div class="card-media">${media}</div><p class="card-caption">${highlighted(item)}</p>${detail ? `<p class="card-detail">${highlighted(detail)}</p>` : ''}<footer><span class="card-footer-title"><b>租租车</b><em>[一周资讯]</em><small>出行政策 · 航线动态 · 旅行优惠</small></span><span>${String(index + 1).padStart(2, '0')} / ${String(rows.length).padStart(2, '0')}</span></footer></article>`;
      }).join('');
    }
    function renderDiscount() {
      const title = $('discount-title').value.trim() || '本周租车特惠折扣';
      const copy = $('discount-copy').value.trim();
      const leftOneLabel = $('discount-left-one-label').value.trim() || '① 打开租租车APP';
      const leftTwoLabel = $('discount-left-two-label').value.trim() || '② 搜索 RED61';
      const rightLabel = $('discount-right-label').value.trim() || '速速领取租车券包';
      const code = $('discount-code').value.trim() || 'RED61';
      const visual = (key, shape, placeholder) => discountImages[key] ? `<img src="${discountImages[key]}" alt="${esc(placeholder)}" />` : `<div class="discount-placeholder">上传图片</div>`;
      $('discount-card').innerHTML = `<h2>${highlighted(title)}</h2><p class="discount-copy">${highlighted(copy)}</p><section class="discount-grid"><div class="discount-left"><div class="discount-visual"><b>${highlighted(leftOneLabel)}</b><div class="discount-image square">${visual('leftOne', 'square', leftOneLabel)}</div></div><div class="discount-visual"><b>${highlighted(leftTwoLabel)}</b><div class="discount-image square">${visual('leftTwo', 'square', leftTwoLabel)}</div></div></div><div class="discount-visual discount-right"><b>${highlighted(rightLabel)}</b><div class="discount-image portrait">${visual('right', 'portrait', rightLabel)}</div></div></section><div class="discount-code"><span>本周专属折扣码</span><strong>${highlighted(code)}</strong></div>`;
    }
    function bindDiscountControls() {
      ['discount-title','discount-copy','discount-left-one-label','discount-left-two-label','discount-right-label','discount-code'].forEach(id => {
        const input = $(id); bindTextSelection(input); input.addEventListener('input', renderDiscount);
      });
      [['discount-left-one-image','leftOne'],['discount-left-two-image','leftTwo'],['discount-right-image','right']].forEach(([id, key]) => $(id).addEventListener('change', event => {
        if (discountImages[key]) URL.revokeObjectURL(discountImages[key]);
        discountImages[key] = event.target.files[0] ? URL.createObjectURL(event.target.files[0]) : '';
        renderDiscount();
      }));
    }
    function refresh() {
      $('view-title').textContent = $('poster-title').value.trim() || '一周资讯';
      $('view-date').textContent = $('poster-date').value.trim();
      $('view-subtitle').textContent = $('poster-subtitle').value.trim();
      const rows = normalizeRows();
      $('news-input').value = rows.join('\n');
      const normalCount = Math.max(0, rows.length - 2);
      const wideRegularIndex = normalCount % 2 ? rows.length - 2 : -1;
      const coverRows = ['1.6fr', ...Array(Math.ceil(normalCount / 2)).fill('1fr'), '.8fr'];
      $('news-list').style.setProperty('--cover-grid-rows', coverRows.join(' '));
      $('news-list').innerHTML = rows.map((item, index) => `<li class="item${index === wideRegularIndex ? ' wide-regular' : ''}"><div><p>${highlighted(item)}</p>${item.length > 50 ? `<div class="over">当前 ${item.length} 字，请压缩至 50 字以内</div>` : ''}</div></li>`).join('');
      $('news-count').textContent = rows.length;
      renderStoryEditors(rows);
      renderBodyEditors(rows);
      renderFlightEditors(rows);
      renderImageControls(rows);
      renderCards(rows);
    }
    ['poster-title','poster-date','poster-subtitle','news-input'].forEach(id => { $(id).addEventListener('input', refresh); bindTextSelection($(id)); });
    $('copy-btn').addEventListener('click', async () => { await navigator.clipboard.writeText($('news-input').value); $('copy-btn').textContent = '已复制'; setTimeout(() => $('copy-btn').textContent = '复制条目', 1200); });
    $('highlight-popover').querySelectorAll('button[data-highlight-color]').forEach(button => button.addEventListener('click', () => {
      const text = selectedHighlightText;
      const color = button.dataset.highlightColor;
      if (!text || highlights.some(item => item.text === text)) return;
      highlights.push({ text, color }); selectedHighlightText = ''; hideHighlightPopover(); refresh(); renderDiscount();
    }));
    $('clear-highlights').addEventListener('click', () => { highlights.length = 0; selectedHighlightText = ''; hideHighlightPopover(); refresh(); renderDiscount(); });
    document.addEventListener('mousedown', event => { if (!event.target.closest('.highlight-popover') && !event.target.closest('input, textarea')) hideHighlightPopover(); });
    function exportTargets() {
      return [
        { element: $('poster'), name: 'weekly-cover' },
        ...Array.from($('card-pages').querySelectorAll('.single-card')).map((element, index) => ({ element, name: `weekly-card-${String(index + 1).padStart(2, '0')}` })),
        { element: $('discount-card'), name: 'weekly-discount' }
      ];
    }
    async function waitForCardImages(element) {
      await Promise.all(Array.from(element.querySelectorAll('img')).map(image => image.complete ? Promise.resolve() : new Promise(resolve => {
        image.addEventListener('load', resolve, { once:true });
        image.addEventListener('error', resolve, { once:true });
      })));
    }
    async function exportJpg(target, status) {
      if (!window.html2canvas) throw new Error('图片导出组件未加载');
      await document.fonts?.ready;
      await waitForCardImages(target.element);
      const canvas = await window.html2canvas(target.element, {
        backgroundColor:'#ffffff', scale:2, useCORS:false, allowTaint:false, logging:false, scrollX:0, scrollY:-window.scrollY,
        onclone: documentClone => Array.from(documentClone.images).filter(image => image.src.startsWith('file:')).forEach(image => image.remove())
      });
      const blob = await new Promise((resolve, reject) => canvas.toBlob(value => value ? resolve(value) : reject(new Error('无法生成 JPG 文件')), 'image/jpeg', .94));
      const link = document.createElement('a');
      const url = URL.createObjectURL(blob);
      link.href = url;
      link.download = `${target.name}.jpg`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      status.textContent = `已导出 ${target.name}.jpg`;
    }
    async function runExport(targets, button) {
      const status = $('export-status');
      button.disabled = true;
      try {
        for (let index = 0; index < targets.length; index += 1) {
          status.textContent = `正在导出 ${index + 1} / ${targets.length}…`;
          await exportJpg(targets[index], status);
        }
        status.textContent = targets.length > 1 ? `已导出全部 ${targets.length} 张 JPG` : '封面 JPG 已导出';
      } catch (error) {
        console.error(error);
        status.textContent = `导出失败：${error?.message || '请重试。'}`;
      } finally {
        button.disabled = false;
      }
    }
    $('export-cover-btn').addEventListener('click', () => runExport([exportTargets()[0]], $('export-cover-btn')));
    $('export-all-btn').addEventListener('click', () => runExport(exportTargets(), $('export-all-btn')));
    $('print-btn').addEventListener('click', () => window.print());
    bindDiscountControls();
    hideHighlightPopover();
    refresh();
    renderDiscount();
  </script>
</body>
</html>
